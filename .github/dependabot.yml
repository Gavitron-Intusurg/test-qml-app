version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    registries:
      - github-packages
    allow:
      - dependency-name: "@gavitron-intusurg/*"

registries:
  github-packages:
    type: npm-registry
    url: https://npm.pkg.github.com
    replaces-base: false
